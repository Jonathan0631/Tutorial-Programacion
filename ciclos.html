<body>
    <h1>🔁 Ciclos</h1>

    <p>Los ciclos permiten repetir instrucciones varias veces.</p>

    <h2>🔹 Básico</h2>
    <pre>
    for i in range(3):
    print("Hola")
    </pre>

    <h2>🔹 Intermedio</h2>
    <pre>
    for i in range(1, 6):
    print(i)
    </pre>

    <h2>🔹 Ejercicio</h2>
    <p>Mostrar números del 1 al 3</p>

    <h2>🔹 Solución</h2>
    <pre>
    for i in range(1, 4):
    print(i)
    </pre>

</body>
