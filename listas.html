<!DOCTYPE html>
<html>
<head>
    <title>Listas</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <h1>📋 Listas</h1>

    <p>Las listas permiten guardar varios valores.</p>

    <h2>🔹 Básico</h2>
    <pre>
lista = [10, 20]
print(lista)
    </pre>

    <h2>🔹 Intermedio</h2>
    <pre>
lista = [10, 20]

lista.append(30)

print(lista)
    </pre>

    <h2>🔹 Ejercicio</h2>
    <p>Agregar un número a la lista</p>

    <h2>🔹 Solución</h2>
    <pre>
lista = [5, 10]
lista.append(15)
print(lista)
    </pre>
